name: Temporary Project Memory Lifecycle Cleanup

on:
  push:
    branches:
      - feature/project-memory-v3

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/project-memory-v3
          fetch-depth: 0

      - name: Add project memory cascade cleanup
        run: |
          python - <<'PY'
          from pathlib import Path

          project_path = Path('construction_os/domain/project.py')
          project_text = project_path.read_text()
          old = '''            # 8. Delete the Project record itself
            await super().delete()
'''
          new = '''            # 8. Delete synthesized project memory
            await repo_query(
                "DELETE project_memory WHERE project_id = $project_id_str",
                {"project_id_str": project_id_str},
            )

            # 9. Delete the Project record itself
            await super().delete()
'''
          if old not in project_text:
              raise SystemExit('Project deletion anchor not found')
          project_path.write_text(project_text.replace(old, new, 1))

          test_path = Path('tests/test_project_delete.py')
          test_text = test_path.read_text()
          old_test = '''    assert "DELETE reference WHERE out = $project_id" in joined
'''
          new_test = '''    assert "DELETE reference WHERE out = $project_id" in joined
    assert "DELETE project_memory WHERE project_id = $project_id_str" in joined
'''
          if old_test not in test_text:
              raise SystemExit('Project deletion test anchor not found')
          test_path.write_text(test_text.replace(old_test, new_test, 1))
          PY

      - name: Commit lifecycle cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add construction_os/domain/project.py tests/test_project_delete.py
          git commit -m "feat: delete project memory with project"
          git push origin HEAD:feature/project-memory-v3
