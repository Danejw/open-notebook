name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint Opportunity Hub backend
        run: |
          python -m ruff check \
            api/opportunity_models.py \
            api/routers/opportunities.py \
            construction_os/domain/opportunity.py \
            construction_os/services/opportunities.py \
            construction_os/services/opportunity_collectors.py \
            construction_os/services/opportunity_scoring.py \
            tests/test_opportunity_collectors.py \
            tests/test_opportunity_scoring.py

      - name: Compile backend modules
        run: python -m compileall -q api construction_os

      - name: Run Opportunity Hub backend tests
        id: backend_tests
        continue-on-error: true
        env:
          CONSTRUCTION_OS_PASSWORD: ''
        run: |
          python -m pytest -q \
            tests/test_opportunity_collectors.py \
            tests/test_opportunity_scoring.py \
            > opportunity-backend-tests.log 2>&1

      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opportunity-backend-diagnostics
          path: opportunity-backend-tests.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Report backend test failure
        if: steps.backend_tests.outcome != 'success'
        run: |
          tail -n 200 opportunity-backend-tests.log
          exit 1

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        id: frontend_tests
        continue-on-error: true
        run: npm test > frontend-tests.log 2>&1

      - name: Build production frontend
        id: frontend_build
        continue-on-error: true
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build > frontend-build.log 2>&1

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opportunity-frontend-diagnostics
          path: |
            frontend/frontend-tests.log
            frontend/frontend-build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Report frontend failure
        if: steps.frontend_tests.outcome != 'success' || steps.frontend_build.outcome != 'success'
        run: |
          echo '--- Frontend tests ---'
          tail -n 150 frontend-tests.log || true
          echo '--- Frontend build ---'
          tail -n 150 frontend-build.log || true
          exit 1
