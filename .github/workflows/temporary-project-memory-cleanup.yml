name: Temporary Project Memory Branch Cleanup

on:
  push:
    branches:
      - feature/project-memory-v3

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/project-memory-v3
          fetch-depth: 0

      - name: Remove stale unused test import
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/test_opportunity_collectors.py')
          text = path.read_text()
          target = '    from unittest.mock import AsyncMock\n\n'
          if target in text:
              text = text.replace(target, '', 1)
              path.write_text(text)
          PY

      - name: Commit cleanup when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_opportunity_collectors.py
          git commit -m "test: remove unused opportunity collector import"
          git push origin HEAD:feature/project-memory-v3
