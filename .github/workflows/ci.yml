name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint Opportunity Hub backend
        run: |
          python -m ruff check \
            api/opportunity_models.py \
            api/routers/opportunities.py \
            construction_os/domain/opportunity.py \
            construction_os/services/opportunities.py \
            construction_os/services/opportunity_collectors.py \
            tests/test_opportunity_collectors.py

      - name: Compile backend modules
        run: |
          python -m compileall -q api construction_os

      - name: Run Opportunity Hub backend tests
        env:
          CONSTRUCTION_OS_PASSWORD: ''
        run: |
          python -m pytest -q tests/test_opportunity_collectors.py

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build production frontend
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build
